services:
  - type: web
    name: masomo-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    releaseCommand: flask --app app db upgrade && flask --app app seed-db
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.10
